apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
        - name: web-app
          image: wordpress:latest
          env:
            - name: WORDPRESS_DB_HOST
              value: "db-service:3306"
            - name: WORDPRESS_DB_PASSWORD
              value: "supersecretpassword"
            - name: WORDPRESS_DB_USER
              value: "root"
            - name: WORDPRESS_DB_NAME
              value: "app_db"
          ports:
            - containerPort: 80