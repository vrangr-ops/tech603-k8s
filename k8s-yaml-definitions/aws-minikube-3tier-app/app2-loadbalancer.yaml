apiVersion: apps/v1
kind: Deployment
metadata:
  name: app2-nginx-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app2-nginx
  template:
    metadata:
      labels:
        app: app2-nginx
    spec:
      containers:
      - name: nginx-container
        image: daraymonsta/tech201-nginx-auto:v1
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: app2-loadbalancer-service
spec:
  type: LoadBalancer
  selector:
    app: app2-nginx
  ports:
    - protocol: TCP
      port: 9000
      targetPort: 80
      nodePort: 30002
