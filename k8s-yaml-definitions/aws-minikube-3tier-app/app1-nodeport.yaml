apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1-nginx-deployment
spec:
  replicas: 5
  selector:
    matchLabels:
      app: app1-nginx
  template:
    metadata:
      labels:
        app: app1-nginx
    spec:
      containers:
      - name: nginx-container
        image: daraymonsta/nginx-257:dreamteam
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: app1-nodeport-service
spec:
  type: NodePort
  selector:
    app: app1-nginx
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30001
