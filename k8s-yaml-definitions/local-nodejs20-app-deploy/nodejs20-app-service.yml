apiVersion: v1
kind: Service
metadata:
  name: nodejs20-sparta-app-service
  namespace: default
spec:
  type: NodePort
  selector:
    app: nodejs20-sparta-app
  ports:
    - protocol: TCP
      port: 3000       # The port the service uses inside the cluster
      targetPort: 3000 # Must match the containerPort in the deployment
      nodePort: 30080  # The port you will use to access the app from your browser/host